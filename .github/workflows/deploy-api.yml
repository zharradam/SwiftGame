name: Build and Deploy API

on:
  push:
    branches:
      - master
    paths:
      - 'SwiftGame.API/**'
      - 'SwiftGame.Data/**'
      - 'SwiftGame.Data.SqlServer/**'
      - 'SwiftGame.Data.PostgreSql/**'
      - 'SwiftGame.Music/**'

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore SwiftGame.API/SwiftGame.API.csproj

      - name: Build
        run: dotnet build SwiftGame.API/SwiftGame.API.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish SwiftGame.API/SwiftGame.API.csproj --configuration Release --no-build --output ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: swiftgame-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish